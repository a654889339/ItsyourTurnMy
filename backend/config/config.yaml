# 财务系统配置文件
# 腾讯云部署时，可通过环境变量覆盖配置

server:
  # HTTP 服务端口
  http_port: 8080
  # gRPC 服务端口
  grpc_port: 9090
  # 运行模式: debug, release
  mode: release
  # 读取超时(秒)
  read_timeout: 30
  # 写入超时(秒)
  write_timeout: 30

database:
  # 数据库类型: sqlite, mysql
  driver: sqlite
  # SQLite 数据库文件路径
  sqlite_path: ./data/finance.db
  # MySQL 配置 (当 driver 为 mysql 时使用)
  mysql:
    host: ${MYSQL_HOST:localhost}
    port: ${MYSQL_PORT:3306}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    database: ${MYSQL_DATABASE:finance}
    charset: utf8mb4
    max_idle_conns: 10
    max_open_conns: 100

jwt:
  # JWT 密钥 (生产环境请务必修改)
  secret: ${JWT_SECRET:finance-system-jwt-secret-2024}
  # Token 有效期(小时)
  expire_hours: 24
  # Token 签发者
  issuer: finance-system

log:
  # 日志级别: debug, info, warn, error
  level: info
  # 日志格式: json, text
  format: json
  # 日志输出: stdout, file
  output: stdout
  # 日志文件路径 (当 output 为 file 时使用)
  file_path: ./logs/app.log
  # 日志文件最大大小(MB)
  max_size: 100
  # 日志文件最大保留天数
  max_age: 30
  # 日志文件最大备份数
  max_backups: 10

cors:
  # 允许的源
  allowed_origins:
    - "*"
  # 允许的方法
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  # 允许的请求头
  allowed_headers:
    - Content-Type
    - Authorization
  # 是否允许携带凭证
  allow_credentials: true

# 腾讯云相关配置
tencent_cloud:
  # 腾讯云 COS 存储配置 (用于文件上传等)
  cos:
    enabled: false
    secret_id: ${TENCENT_SECRET_ID:}
    secret_key: ${TENCENT_SECRET_KEY:}
    region: ap-guangzhou
    bucket: finance-bucket
  # 腾讯云 CLS 日志服务配置
  cls:
    enabled: false
    secret_id: ${TENCENT_SECRET_ID:}
    secret_key: ${TENCENT_SECRET_KEY:}
    region: ap-guangzhou
    topic_id: ${CLS_TOPIC_ID:}
