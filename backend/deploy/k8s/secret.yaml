# Secret - 敏感配置
# 注意: 实际部署时请使用腾讯云 Secret Manager 或手动创建
# 以下值需要 base64 编码: echo -n 'your-value' | base64

apiVersion: v1
kind: Secret
metadata:
  name: finance-secrets
  namespace: finance-system
  labels:
    app: finance
type: Opaque
data:
  # MySQL 配置 (base64 编码)
  # echo -n 'finance-mysql' | base64 = ZmluYW5jZS1teXNxbA==
  MYSQL_HOST: ZmluYW5jZS1teXNxbA==
  # echo -n 'finance' | base64 = ZmluYW5jZQ==
  MYSQL_USER: ZmluYW5jZQ==
  # echo -n 'your-mysql-password' | base64
  MYSQL_PASSWORD: eW91ci1teXNxbC1wYXNzd29yZA==
  # echo -n 'finance' | base64 = ZmluYW5jZQ==
  MYSQL_DATABASE: ZmluYW5jZQ==
  # JWT 密钥 (请修改为强密码)
  # echo -n 'your-jwt-secret-key-change-in-production' | base64
  JWT_SECRET: eW91ci1qd3Qtc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==
