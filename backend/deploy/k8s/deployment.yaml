# Deployment - 应用部署配置
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-backend
  namespace: finance-system
  labels:
    app: finance
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: finance
        component: backend
      annotations:
        # 配置变更时触发重新部署
        checksum/config: "{{ include (print $.Template.BasePath \"/configmap.yaml\") . | sha256sum }}"
    spec:
      # 腾讯云镜像拉取密钥 (如果使用腾讯云容器镜像服务)
      # imagePullSecrets:
      #   - name: tcr-secret

      containers:
        - name: finance-backend
          # 腾讯云容器镜像服务地址
          # 格式: ccr.ccs.tencentyun.com/<namespace>/<repository>:<tag>
          image: ccr.ccs.tencentyun.com/finance/finance-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            # 从 Secret 读取敏感配置
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: finance-secrets
                  key: MYSQL_HOST
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: finance-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finance-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: finance-secrets
                  key: MYSQL_DATABASE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: finance-secrets
                  key: JWT_SECRET
            # 其他环境变量
            - name: HTTP_PORT
              value: "8080"
            - name: GRPC_PORT
              value: "9090"
            - name: DB_DRIVER
              value: "mysql"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_FORMAT
              value: "json"
          # 资源限制
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # 存活探针
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          # 就绪探针
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # 挂载配置文件
          volumeMounts:
            - name: config
              mountPath: /etc/finance
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: finance-config
      # 调度策略
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - finance
                topologyKey: kubernetes.io/hostname
      # 优雅终止时间
      terminationGracePeriodSeconds: 30
