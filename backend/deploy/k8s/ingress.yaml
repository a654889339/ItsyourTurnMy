# Ingress - 入口配置 (适用于使用 Nginx Ingress Controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-ingress
  namespace: finance-system
  labels:
    app: finance
  annotations:
    # Nginx Ingress 注解
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # 跨域配置
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
    # 腾讯云 CLB Ingress 注解 (如果使用腾讯云 CLB Ingress)
    # kubernetes.io/ingress.class: qcloud
    # kubernetes.io/ingress.existLbId: "lb-xxxxxxxx"
    # kubernetes.io/ingress.subnetId: "subnet-xxxxxxxx"
spec:
  # TLS 配置 (需要先创建 Secret)
  tls:
    - hosts:
        - finance.example.com
      secretName: finance-tls-secret
  rules:
    - host: finance.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: finance-backend
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: finance-backend
                port:
                  number: 8080
