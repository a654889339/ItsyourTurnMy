# Docker Compose 配置文件
# 适用于腾讯云轻量应用服务器或 CVM 单机部署

version: '3.8'

services:
  # 后端服务
  finance-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      # 服务配置
      - HTTP_PORT=8080
      - GRPC_PORT=9090
      - SERVER_MODE=release
      # 数据库配置 (使用 SQLite)
      - DB_DRIVER=sqlite
      - SQLITE_PATH=/app/data/finance.db
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-finance-system-jwt-secret-2024}
      - JWT_EXPIRE_HOURS=24
      # 日志配置
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      # CORS 配置
      - CORS_ORIGINS=*
    volumes:
      # 持久化数据
      - finance_data:/app/data
      # 可选: 挂载自定义配置
      # - ./config/config.yaml:/etc/finance/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - finance-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MySQL 服务 (可选，如果使用 MySQL 而不是 SQLite)
  # finance-mysql:
  #   image: mysql:8.0
  #   container_name: finance-mysql
  #   restart: unless-stopped
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
  #     - MYSQL_DATABASE=finance
  #     - MYSQL_USER=finance
  #     - MYSQL_PASSWORD=${MYSQL_PASSWORD:-financepassword}
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   networks:
  #     - finance-network
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

  # Nginx 反向代理 (可选，用于 HTTPS)
  # nginx:
  #   image: nginx:alpine
  #   container_name: finance-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - finance-backend
  #   networks:
  #     - finance-network

volumes:
  finance_data:
    driver: local
  # mysql_data:
  #   driver: local

networks:
  finance-network:
    driver: bridge
